name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Backend
  backend-ci:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vybe_test
          POSTGRES_USER: vybe
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          cd backend
          ruff check .
          ruff format --check .

      - name: Type check (mypy)
        run: |
          cd backend
          mypy . --ignore-missing-imports

      - name: Tests (pytest)
        env:
          DATABASE_URL: postgresql+asyncpg://vybe:testpassword@localhost:5432/vybe_test
          REDIS_URL: redis://localhost:6379
          LASTFM_API_KEY: test_key
          GENIUS_ACCESS_TOKEN: test_token
          SECRET_KEY: test_secret_key_for_ci_only
        run: |
          cd backend
          pytest tests/ --cov=. --cov-report=xml -q

  # Frontend
  frontend-ci:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: |
          cd mobile
          npm ci --legacy-peer-deps

      - name: Lint (ESLint)
        run: |
          cd mobile
          npx eslint . --ext .ts,.tsx --max-warnings 0

      - name: Type check (TypeScript)
        run: |
          cd mobile
          npx tsc --noEmit

      - name: Tests (Jest)
        run: |
          cd mobile
          npm test -- --watchAll=false --passWithNoTests
